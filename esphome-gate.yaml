esphome:
  name: esphome-gate
  on_boot:
    priority: 600
    then:
      - output.turn_on: lock_relay

esp8266:
  board: nodemcuv2

wifi:
  ap:
    ssid: "Gate Fallback Hotspot"

captive_portal:

web_server:
  port: 80

logger:
  baud_rate: 0

ota:

output:
  - platform: esp8266_pwm
    pin: GPIO12
    frequency: 1000Hz
    id: led_output
  - platform: esp8266_pwm
    pin: GPIO14
    frequency: 2000Hz
    id: buzzer_output
  - platform: gpio
    pin: GPIO5
    id: lock_relay

light:
  - platform: monochromatic
    output: led_output
    id: led_light
    name: "LED Estado"
    default_transition_length: 0s
    effects:
      - pulse:
          name: "Latido Suave"
          transition_length: 1s
          update_interval: 1s
          min_brightness: 50%
          max_brightness: 100%
      - strobe:
          name: "Flash Rapido"
          duration: 400ms

rtttl:
  output: buzzer_output
  id: buzzer_rtttl

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO4
      inverted: true
      mode: INPUT_PULLUP
    id: pulsador_interno
    name: "Pulsador Interno"
    filters:
      - delayed_on_off: 50ms
    on_click:
      - min_length: 50ms
        max_length: 3900ms
        then:
          - lambda: |-
              if (id(system_active)) {
                id(internal_press_script).execute();
              }
      - min_length: 4100ms
        max_length: 60000ms
        then:
          - lambda: |-
              if (!id(system_active)) {
                id(enable_system_script).execute();
              } else if (x > 8000) {
                id(disable_system_script).execute();
              }

  - platform: gpio
    pin: GPIO16
    id: pulsador_externo
    name: "Pulsador Externo"
    filters:
      - delayed_on_off: 50ms
    on_click:
      - min_length: 50ms
        max_length: 3900ms
        then:
          - script.execute: external_press_script

  - platform: gpio
    pin:
      number: GPIO13
      mode: INPUT_PULLUP
    id: final_carrera
    name: "Final Carrera"
    filters:
      - delayed_on_off: 100ms
    on_press:
      then:
        - lambda: |-
            if (!id(desbloqueo_normal_activo) && !id(lock_relay).state) {
              id(emergency_alert_script).execute();
            }
    on_release:
      then:
        - script.stop: emergency_alert_script
        - script.stop: gate_open_flash_script
        - lambda: |-
            if (id(system_active) && !id(desbloqueo_normal_activo) && id(safe_lock_enabled).state && id(lock_relay).state) {
              id(lock_relay).turn_off();
            }
        - light.turn_off: led_light
        - light.turn_on:
            id: led_light
            brightness: 25%
            transition_length: 1s
        - output.turn_off: buzzer_output

globals:
  - id: system_active
    type: bool
    initial_value: 'false'
  - id: melody_index
    type: int
    initial_value: '0'
  - id: cooldown_externo_activo
    type: bool
    initial_value: 'false'
  - id: desbloqueo_normal_activo
    type: bool
    initial_value: 'false'
  - id: unlock_duration_ms
    type: int
    initial_value: '5000'
  - id: emergency_cycle
    type: int
    initial_value: '0'
  - id: doorbell_led_duration_ms
    type: int
    initial_value: '45000'
  - id: gate_open_flash_interval_ms
    type: int
    initial_value: '5000'
  - id: unlock_grace_ms
    type: int
    initial_value: '2000'

switch:
  - platform: template
    name: "Safe Lock"
    id: safe_lock_enabled
    optimistic: true
    initial_value: 'true'
    restore_mode: RESTORE_DEFAULT_ON

number:
  - platform: template
    name: "Doorbell LED Duration"
    min_value: 10
    max_value: 120
    step: 1
    unit_of_measurement: s
    initial_value: 45
    id: doorbell_led_duration
    optimistic: true
    set_action:
      - lambda: 'id(doorbell_led_duration_ms) = int(x * 1000);'
  - platform: template
    name: "Gate Open Flash Interval"
    min_value: 1
    max_value: 30
    step: 1
    unit_of_measurement: s
    initial_value: 5
    id: gate_open_flash_interval
    optimistic: true
    set_action:
      - lambda: 'id(gate_open_flash_interval_ms) = int(x * 1000);'
  - platform: template
    name: "Grace Duration"
    min_value: 0.5
    max_value: 10
    step: 0.5
    unit_of_measurement: s
    initial_value: 2
    id: unlock_grace_duration
    optimistic: true
    set_action:
      - lambda: 'id(unlock_grace_ms) = int(x * 1000);'

script:
  - id: external_press_script
    mode: single
    then:
      - if:
          condition:
            lambda: 'return id(system_active) && !id(cooldown_externo_activo);'
          then:
            - lambda: 'id(cooldown_externo_activo) = true;'
            - script.stop: timer_reset_melodia
            - output.turn_off: buzzer_output
            - lambda: |-
                switch (id(melody_index)) {
                  case 0: id(buzzer_rtttl).play(std::string("d=8,o=6,b=140:c,c,g,4g,16g,16p,f,g,c,2c,p")); break;
                  case 1: id(buzzer_rtttl).play(std::string("d=8,o=6,b=140:c,g,c7,4c7,16c7,16p,b,c7,g,2g,p")); break;
                  case 2: id(buzzer_rtttl).play(std::string("d=4,o=4,b=100:c7,b,2a,16a,16p,a,d7,b,2g,p")); break;
                  case 3: id(buzzer_rtttl).play(std::string("d=4,o=4,b=100:a,b,c7,g,f,e,g,4d,16d,16p,c,2c,p")); break;
                }
            - light.turn_on:
                id: led_light
                effect: "Latido Suave"
                brightness: 100%
            - delay: !lambda 'return id(doorbell_led_duration_ms);'
            - light.turn_off: led_light
            - light.turn_on:
                id: led_light
                brightness: 25%
                transition_length: 1s
            - lambda: 'id(cooldown_externo_activo) = false;'
            - lambda: 'id(melody_index) = (id(melody_index) + 1) % 4;'
            - script.execute: timer_reset_melodia

  - id: internal_press_script
    mode: single
    then:
      - if:
          condition:
            lambda: 'return id(system_active);'
          then:
            - script.stop: emergency_alert_script
            - output.turn_off: buzzer_output
            - script.execute: unlock_gate_script
            - delay: !lambda 'return id(doorbell_led_duration_ms);'
            - if:
                condition:
                  binary_sensor.is_on: final_carrera
                then:
                  - lambda: 'id(melody_index) = 0;'
                  - script.execute: gate_open_flash_script
                else:
                  - light.turn_off: led_light
                  - light.turn_on:
                      id: led_light
                      brightness: 25%
                      transition_length: 1s

  - id: unlock_gate_script
    mode: single
    then:
      - lambda: |
          id(desbloqueo_normal_activo) = true;
          id(buzzer_rtttl).stop();
          id(buzzer_output).turn_off();
          id(lock_relay).turn_on();

          unsigned long start = millis();
          unsigned long timeout = id(unlock_duration_ms);
          unsigned long last_toggle = start;
          unsigned long grace_start = 0;
          bool door_was_opened = false;
          bool grace_expired = false;
          bool led_on = true;

          // LED on full
          {
            auto call = id(led_light).make_call();
            call.set_brightness(1.0f);
            call.set_transition_length(0);
            call.perform();
          }

          while (millis() - start < timeout) {
            unsigned long now = millis();

            // detect door opened
            if (!door_was_opened && id(final_carrera).state) {
              door_was_opened = true;
              grace_start = now;
              id(buzzer_rtttl).stop();
              id(buzzer_output).turn_off();
            }

            if (door_was_opened) {
              // door closed → lock immediately
              if (!id(final_carrera).state) {
                id(lock_relay).turn_off();
                id(buzzer_rtttl).stop();
                id(buzzer_output).turn_off();
                {
                  auto call = id(led_light).make_call();
                  call.set_brightness(0.25f);
                  call.set_transition_length(1000);
                  call.perform();
                }
                id(desbloqueo_normal_activo) = false;
                return;
              }

              // grace period: keep melody playing
              if (!grace_expired && now - grace_start >= id(unlock_grace_ms)) {
                grace_expired = true;
                id(buzzer_rtttl).stop();
                id(buzzer_output).turn_off();
              }

              if (!grace_expired && !id(buzzer_rtttl).is_playing()) {
                id(buzzer_rtttl).play(std::string("d=16,o=7,b=225:c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,c"));
              }
            } else {
              // door not opened yet: play melody
              if (!id(buzzer_rtttl).is_playing()) {
                id(buzzer_rtttl).play(std::string("d=16,o=7,b=225:c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,p,c,c"));
              }
            }

            // LED toggling at 67ms
            if (now - last_toggle >= 67) {
              led_on = !led_on;
              last_toggle = now;
              auto call = id(led_light).make_call();
              call.set_brightness(led_on ? 1.0f : 0.0f);
              call.set_transition_length(0);
              call.perform();
            }

            delay(10);
          }

          // timeout reached
          if (!id(final_carrera).state || !id(safe_lock_enabled).state) {
            id(lock_relay).turn_off();
          }
          // else: safe lock ON + door open → relay stays ON, FC on_release will lock

          id(buzzer_rtttl).stop();
          id(buzzer_output).turn_off();
          {
            auto call = id(led_light).make_call();
            call.set_brightness(0.25f);
            call.set_transition_length(1000);
            call.perform();
          }
          id(desbloqueo_normal_activo) = false;

  - id: enable_system_script
    mode: single
    then:
      - lambda: 'id(system_active) = true;'
      - lambda: 'id(buzzer_rtttl).play(std::string("d=4,o=5,b=320:c,16p,e,16p,g,16p,c6"));'
      - light.turn_on:
          id: led_light
          brightness: 100%
      - delay: 190ms
      - light.turn_off: led_light
      - delay: 45ms
      - light.turn_on:
          id: led_light
          brightness: 100%
      - delay: 190ms
      - light.turn_off: led_light
      - delay: 45ms
      - light.turn_on:
          id: led_light
          brightness: 100%
      - delay: 190ms
      - light.turn_off: led_light
      - delay: 45ms
      - light.turn_on:
          id: led_light
          brightness: 100%
      - delay: 190ms
      - light.turn_off: led_light
      - light.turn_on:
          id: led_light
          brightness: 25%
      - if:
          condition:
            or:
              - binary_sensor.is_off: final_carrera
              - switch.is_off: safe_lock_enabled
          then:
            - output.turn_off: lock_relay

  - id: disable_system_script
    mode: single
    then:
      - lambda: 'id(system_active) = false;'
      - lambda: 'id(buzzer_rtttl).play(std::string("d=4,o=5,b=320:c6,16p,g,16p,e,16p,c"));'
      - light.turn_on:
          id: led_light
          brightness: 100%
      - delay: 190ms
      - light.turn_off: led_light
      - delay: 45ms
      - light.turn_on:
          id: led_light
          brightness: 100%
      - delay: 190ms
      - light.turn_off: led_light
      - delay: 45ms
      - light.turn_on:
          id: led_light
          brightness: 100%
      - delay: 190ms
      - light.turn_off: led_light
      - delay: 45ms
      - light.turn_on:
          id: led_light
          brightness: 100%
      - delay: 190ms
      - light.turn_off: led_light
      - output.turn_on: lock_relay

  - id: emergency_alert_script
    mode: single
    then:
      - rtttl.stop: buzzer_rtttl
      - output.turn_off: buzzer_output
      - lambda: 'id(emergency_cycle) = 0;'
      - while:
          condition:
            and:
              - lambda: 'return id(emergency_cycle) < 12;'
              - binary_sensor.is_on: final_carrera
          then:
            - lambda: 'id(buzzer_rtttl).play(std::string("d=1,o=6,b=225:c,8p,c,8p,c,8p,c,8p"));'
            - lambda: |
                for (int i = 0; i < 4 && id(final_carrera).state; i++) {
                  {
                    auto call = id(led_light).make_call();
                    call.set_brightness(1.0f);
                    call.set_transition_length(0);
                    call.perform();
                  }
                  unsigned long t = millis();
                  while (millis() - t < 1067 && id(final_carrera).state) delay(10);

                  {
                    auto call = id(led_light).make_call();
                    call.set_brightness(0.0f);
                    call.set_transition_length(0);
                    call.perform();
                  }
                  t = millis();
                  while (millis() - t < 133 && id(final_carrera).state) delay(10);
                }
            - lambda: 'id(emergency_cycle)++;'
      - output.turn_off: buzzer_output
      - if:
          condition:
            binary_sensor.is_on: final_carrera
          then:
            - script.execute: gate_open_flash_script
          else:
            - light.turn_on:
                id: led_light
                brightness: 25%
                transition_length: 1s

  - id: gate_open_flash_script
    mode: single
    then:
      - while:
          condition:
            binary_sensor.is_on: final_carrera
          then:
            - light.turn_on:
                id: led_light
                brightness: 100%
                transition_length: 0s
            - lambda: 'id(buzzer_rtttl).play(std::string("d=8,o=5,b=300:b"));'
            - delay: 100ms
            - light.turn_off:
                id: led_light
                transition_length: 0s
            - delay: !lambda 'return id(gate_open_flash_interval_ms) - 100;'

  - id: timer_reset_melodia
    mode: single
    then:
      - delay: 60s
      - lambda: 'id(melody_index) = 0;'
