esphome:
  name: esphome-gate
  platform: ESP8266
  board: nodemcuv2
  includes:
    - melodies.h
  on_boot:
    priority: 600
    then:
      - output.turn_on: lock_relay

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Gate Fallback Hotspot"
    password: !secret ap_password

captive_portal:

web_server:
  port: 80

logger:
  baud_rate: 0

ota:

output:
  - platform: esp8266_pwm
    pin: GPIO12
    frequency: 1000Hz
    id: led_output
  - platform: esp8266_pwm
    pin: GPIO14
    frequency: 2000Hz
    id: buzzer_output
  - platform: gpio
    pin: GPIO5
    id: lock_relay

light:
  - platform: monochromatic
    output: led_output
    id: led_light
    name: "LED Estado"
    default_transition_length: 0s
    effects:
      - pulse:
          name: "Latido Suave"
          transition_length: 1s
          update_interval: 1s
          min_brightness: 50%
          max_brightness: 100%
      - strobe:
          name: "Flash Rapido"
          duration: 400ms

rtttl:
  output: buzzer_output
  id: buzzer_rtttl

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO4
      inverted: true
      mode: INPUT_PULLUP
    id: pulsador_interno
    name: "Pulsador Interno"
    filters:
      - delayed_on_off: 50ms
    on_click:
      - min_length: 50ms
        max_length: 3900ms
        then:
          - lambda: |-
              if (id(system_active)) {
                id(internal_press_script).execute();
              }
      - min_length: 4100ms
        max_length: 60000ms
        then:
          - lambda: |-
              if (!id(system_active)) {
                id(enable_system_script).execute();
              } else if (x > 8000) {
                id(disable_system_script).execute();
              }

  - platform: gpio
    pin: GPIO16
    id: pulsador_externo
    name: "Pulsador Externo"
    filters:
      - delayed_on_off: 50ms
    on_click:
      - min_length: 50ms
        max_length: 3900ms
        then:
          - script.execute: external_press_script

  - platform: gpio
    pin:
      number: GPIO13
      mode: INPUT_PULLUP
    id: final_carrera
    name: "Final Carrera"
    filters:
      - delayed_on_off: 100ms
    on_press:
      then:
        - lambda: |-
            if (!id(desbloqueo_normal_activo) && !id(lock_relay).state) {
              id(emergency_alert_script).execute();
            }
    on_release:
      then:
        - script.stop: emergency_alert_script
        - script.stop: gate_open_flash_script
        - light.turn_on:
            id: led_light
            brightness: 25%
            transition_length: 1s
        - output.turn_off: buzzer_output

globals:
  - id: system_active
    type: bool
    initial_value: 'false'
  - id: melody_index
    type: int
    initial_value: '0'
  - id: cooldown_externo_activo
    type: bool
    initial_value: 'false'
  - id: desbloqueo_normal_activo
    type: bool
    initial_value: 'false'
  - id: unlock_duration_ms
    type: int
    initial_value: '5000'
  - id: emergency_cycle
    type: int
    initial_value: '0'
  - id: doorbell_led_duration_ms
    type: int
    initial_value: '45000'
  - id: gate_open_flash_interval_ms
    type: int
    initial_value: '5000'

number:
  - platform: template
    name: "Doorbell LED Duration"
    min_value: 10
    max_value: 120
    step: 1
    unit_of_measurement: s
    initial_value: 45
    id: doorbell_led_duration
    optimistic: true
    set_action:
      - lambda: |-
          id(doorbell_led_duration).publish_state(x);
          id(doorbell_led_duration_ms) = int(x * 1000);
  - platform: template
    name: "Gate Open Flash Interval"
    min_value: 1
    max_value: 30
    step: 1
    unit_of_measurement: s
    initial_value: 5
    id: gate_open_flash_interval
    optimistic: true
    set_action:
      - lambda: |-
          id(gate_open_flash_interval).publish_state(x);
          id(gate_open_flash_interval_ms) = int(x * 1000);

timer:
  - id: timer_reset_melodia
    mode: single
    duration: 60s
    then:
      - lambda: 'id(melody_index) = 0;'

script:
  - id: external_press_script
    mode: single
    then:
      - if:
          condition:
            lambda: 'return id(system_active) && !id(cooldown_externo_activo);'
          then:
            - lambda: 'id(cooldown_externo_activo) = true;'
            - timer.cancel: timer_reset_melodia
            - output.turn_off: buzzer_output
            - rtttl.play: !lambda 'return std::string(ALL_MELODIES[id(melody_index)]);'
            - light.turn_on:
                id: led_light
                effect: "Latido Suave"
                brightness: 100%
            - delay: !lambda 'return id(doorbell_led_duration_ms);'
            - light.turn_on:
                id: led_light
                brightness: 25%
                transition_length: 1s
            - lambda: 'id(cooldown_externo_activo) = false;'
            - lambda: 'id(melody_index) = (id(melody_index) + 1) % 4;'
            - timer.start: timer_reset_melodia

  - id: internal_press_script
    mode: single
    then:
      - if:
          condition:
            lambda: 'return id(system_active);'
          then:
            - script.stop: emergency_alert_script
            - light.turn_on:
                id: led_light
                effect: "Flash Rapido"
                brightness: 100%
            - output.turn_off: buzzer_output
            - script.execute: unlock_gate_script
            - delay: !lambda 'return id(doorbell_led_duration_ms);'
            - lambda: |-
                if (id(final_carrera).state) {
                  id(melody_index) = 0;
                  id(gate_open_flash_script).execute();
                } else {
                  auto call = id(led_light).make_call();
                  call.set_brightness(0.25);
                  call.set_transition_length(1000);
                  call.perform();
                }

  - id: unlock_gate_script
    mode: single
    then:
      - lambda: |
          id(desbloqueo_normal_activo) = true;
          id(buzzer_rtttl).stop();
          id(buzzer_output).turn_off();
          id(lock_relay).turn_on();

          unsigned long start = millis();
          unsigned long timeout = id(unlock_duration_ms);
          unsigned long last_toggle = start;
          bool led_on = true;

          // APERTURA = d=16,o=7,b=225:c,p,c,p,...
          // 16th note at 225 BPM = 67ms. LED ON durante nota, OFF durante silencio.
          {
            auto call = id(led_light).make_call();
            call.set_brightness(1.0f);
            call.set_transition_length(0);
            call.perform();
          }

          while (!id(final_carrera).state && millis() - start < timeout) {
            unsigned long now = millis();

            if (!id(buzzer_rtttl).is_playing()) {
              id(buzzer_rtttl).play(std::string(APERTURA));
            }

            if (now - last_toggle >= 67) {
              led_on = !led_on;
              last_toggle = now;
              auto call = id(led_light).make_call();
              call.set_brightness(led_on ? 1.0f : 0.0f);
              call.set_transition_length(0);
              call.perform();
            }

            delay(10);
          }

          id(lock_relay).turn_off();
          id(buzzer_rtttl).stop();
          id(buzzer_output).turn_off();
          {
            auto call = id(led_light).make_call();
            call.set_brightness(0.25f);
            call.set_transition_length(1000);
            call.perform();
          }
          id(desbloqueo_normal_activo) = false;

  - id: enable_system_script
    mode: single
    then:
      - lambda: 'id(system_active) = true;'
      - rtttl.play: !lambda 'return std::string(ACTIVAR);'
      - light.turn_on:
          id: led_light
          brightness: 100%
      - delay: 200ms
      - light.turn_off: led_light
      - delay: 200ms
      - light.turn_on:
          id: led_light
          brightness: 100%
      - delay: 200ms
      - light.turn_off: led_light
      - delay: 200ms
      - light.turn_on:
          id: led_light
          brightness: 100%
      - delay: 200ms
      - light.turn_off: led_light
      - light.turn_on:
          id: led_light
          brightness: 25%
      - output.turn_off: lock_relay

  - id: disable_system_script
    mode: single
    then:
      - lambda: 'id(system_active) = false;'
      - rtttl.play: !lambda 'return std::string(DESACTIVAR);'
      - light.turn_on:
          id: led_light
          brightness: 100%
      - delay: 600ms
      - light.turn_off: led_light
      - delay: 600ms
      - light.turn_on:
          id: led_light
          brightness: 100%
      - delay: 600ms
      - light.turn_off: led_light
      - delay: 600ms
      - light.turn_on:
          id: led_light
          brightness: 100%
      - delay: 600ms
      - light.turn_off: led_light
      - output.turn_on: lock_relay

  - id: emergency_alert_script
    mode: single
    then:
      - rtttl.stop: buzzer_rtttl
      - output.turn_off: buzzer_output
      - lambda: 'id(emergency_cycle) = 0;'
      - while:
          condition:
            lambda: 'return id(emergency_cycle) < 12 && id(final_carrera).state;'
          then:
            - rtttl.play: !lambda 'return std::string(EMERGENCIA);'
            - lambda: |
                // EMERGENCIA = d=1,o=6,b=225:c,8p,c,8p,c,8p,c,8p
                // whole note ~1067ms, 8th rest ~133ms
                for (int i = 0; i < 4 && id(final_carrera).state; i++) {
                  {
                    auto call = id(led_light).make_call();
                    call.set_brightness(1.0f);
                    call.set_transition_length(0);
                    call.perform();
                  }
                  unsigned long t = millis();
                  while (millis() - t < 1067 && id(final_carrera).state) delay(10);

                  {
                    auto call = id(led_light).make_call();
                    call.set_brightness(0.0f);
                    call.set_transition_length(0);
                    call.perform();
                  }
                  t = millis();
                  while (millis() - t < 133 && id(final_carrera).state) delay(10);
                }
            - lambda: 'id(emergency_cycle)++;'
      - output.turn_off: buzzer_output
      - lambda: |-
          if (id(final_carrera).state) {
            id(gate_open_flash_script).execute();
          } else {
            auto call = id(led_light).make_call();
            call.set_brightness(0.25);
            call.set_transition_length(1000);
            call.perform();
          }

  - id: gate_open_flash_script
    mode: single
    then:
      - while:
          condition:
            lambda: 'return id(final_carrera).state;'
          then:
            - light.turn_on:
                id: led_light
                brightness: 100%
                transition_length: 0s
            - rtttl.play: !lambda 'return std::string(BEEP_FLASH);'
            - delay: 100ms
            - light.turn_off:
                id: led_light
                transition_length: 0s
            - delay: !lambda 'return id(gate_open_flash_interval_ms) - 100;'
